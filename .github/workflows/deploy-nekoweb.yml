#rerun

name: Deploy to Nekoweb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p build
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            ./ build/

      - name: Create deploy archive
        run: |
          cd build
          zip -r ../site.zip .

      - name: Deploy to Nekoweb (UPLOAD STEP)
        run: |
          curl -X POST \
            -H "Authorization: ${{ secrets.NEKOWEB_API_KEY }}" \
            -F "file=@site.zip" \
            https://nekoweb.org/api/files/upload
