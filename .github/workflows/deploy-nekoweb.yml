name: Deploy to Nekoweb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to Nekoweb (root-safe)
        run: |
          find . -type f \
            ! -path "./.git/*" \
            ! -path "./.github/*" \
            ! -path "./build/*" \
          | while read file; do
              curl -X POST \
                -H "Authorization: ${{ secrets.NEKOWEB_API_KEY }}" \
                -F "file=@${file}" \
                -F "path=/${file#./}" \
                https://nekoweb.org/api/upload
            done
