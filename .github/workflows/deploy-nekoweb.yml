name: Deploy to Nekoweb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p build
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            ./ build/

      - name: Create deploy archive (absolute path)
        run: |
          cd build
          zip -r /tmp/site.zip .

      - name: Deploy to Nekoweb
        run: |
          curl -X POST \
            -H "Authorization: ${{ secrets.NEKOWEB_API_KEY }}" \
            -F "file=@/tmp/site.zip" \
            https://nekoweb.org/api/files/upload
