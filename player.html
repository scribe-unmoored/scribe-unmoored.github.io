<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    border-top: 1px solid #c5a35a;
    font-family: Georgia, "Times New Roman", serif;
    color: #d8d5cc;
    height: 60px;
    overflow: hidden;
  }
  .player {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 24px;
    height: 60px;
  }
  .controls { display: flex; align-items: center; gap: 12px; }
  .btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #c5a35a;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }
  .btn:hover { color: #e2d2a2; }
  .btn svg { width: 16px; height: 16px; fill: currentColor; }
  .btn.play svg { width: 20px; height: 20px; }
  .divider { width: 1px; height: 28px; background: #3a3323; }
  .track-info { flex: 1; min-width: 0; }
  .track-title {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #e2d2a2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-sub {
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    color: #6b6457;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .label {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    color: #6b6457;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="player">
  <div class="controls">
    <button class="btn" onclick="prev()" aria-label="Previous">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="btn play" id="playbtn" onclick="togglePlay()" aria-label="Play">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="btn" onclick="next()" aria-label="Next">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.14 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
    </button>
  </div>
  <div class="divider"></div>
  <div class="track-info">
    <div class="track-title" id="track-title">Daggerfall Tavern Lofi</div>
    <div class="track-sub">THE SCRIBE UNMOORED — SOUNDTRACK</div>
  </div>
  <div class="label">Now Playing</div>
</div>

<audio id="audio"></audio>

<script>
  const tracks = [
    { title: "Daggerfall Tavern Lofi", src: "music/daggerfalltavernlofi.mp3" },
    { title: "Dead Moon", src: "music/deadmoon.m4a" }
  ];

  let current = 0;
  const audio = document.getElementById('audio');
  const titleEl = document.getElementById('track-title');
  const btn = document.getElementById('playbtn');

  const playIcon = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  const pauseIcon = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

  function load(index) {
    current = index;
    audio.src = tracks[current].src;
    titleEl.textContent = tracks[current].title;
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      btn.innerHTML = pauseIcon;
    } else {
      audio.pause();
      btn.innerHTML = playIcon;
    }
  }

  function next() {
    load((current + 1) % tracks.length);
    audio.play();
    btn.innerHTML = pauseIcon;
  }

  function prev() {
    load((current - 1 + tracks.length) % tracks.length);
    audio.play();
    btn.innerHTML = pauseIcon;
  }

  audio.addEventListener('ended', next);
  load(0);
</script>
</body>
</html>
